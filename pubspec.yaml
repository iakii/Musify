name: musify
version: "9.0.4+111"
homepage: "https://github.com/gokadzev/Musify"
publish_to: none
environment:
  sdk: ">=3.6.2 <4.0.0"
description: "Music Streaming app made in Flutter!"
dependencies:
  audio_service:
    git:
      url: "https://gitcode.com/openharmony-sig/fluttertpc_audio_service.git"
      ref: master
      path: "audio_service"
  audio_session:
    git:
      url: "https://gitcode.com/openharmony-sig/flutter_audio_session.git"
      ref: br_v0.1.21_ohos
  bili_music_api:
    path: "../bili_music_api"
  cached_network_image: "^3.4.1"
  collection: "^1.18.0"
  dynamic_color: "^1.7.0"
  extended_image: "^9.1.0"
  ffi: ^2.1.3
  file_picker_ohos:
    git:
      url: "https://gitcode.com/openharmony-sig/fluttertpc_file_picker.git"
      ref: master
      path: ohos
  fluentui_system_icons: "^1.1.270"
  flutter:
    sdk: flutter
  flutter_flip_card: "^0.0.6"
  flutter_localizations:
    sdk: flutter
  flutter_lyric: "^2.0.4+6"
  go_router:
    git:
      url: "https://gitcode.com/openharmony-sig/flutter_packages.git"
      ref: master
      path: "packages/go_router"
  hive: "^2.2.3"
  hive_flutter: "^1.1.0"
  html: "^0.15.4"
  http: "^1.2.2"
  http_proxy: "^1.2.2"
  intl: "^0.19.0"
  just_audio: ^0.10.4
  just_audio_media_kit: "^2.0.6"
  just_audio_ohos:
    git:
      url: "https://gitcode.com/openharmony-sig/fluttertpc_just_audio.git"
      ref: br_just_audio-v0.9.41_ohos
      path: "just_audio/ohos"
  media_kit_libs_linux: any
  media_kit_libs_macos_audio: any
  media_kit_libs_windows_audio: "^1.0.9"
  path_provider:
    git:
      url: "https://gitcode.com/openharmony-sig/flutter_packages.git"
      ref: br_path_provider-v2.1.4_ohos
      path: "packages/path_provider/path_provider"
  rxdart: "^0.27.7"
  url_launcher:
    git:
      url: "https://gitcode.com/openharmony-sig/flutter_packages.git"
      # ref: br_url_launcher-v6.3.0_ohos
      path: "packages/url_launcher/url_launcher"
  window_manager: ^0.5.0
  youtube_explode_dart: "^2.3.6"
dev_dependencies:
  flutter_launcher_icons: "^0.14.2"
  flutter_lints: ^5.0.0
  flutter_native_splash: "^2.2.19"
  flutter_test:
    sdk: flutter
  import_sorter: "^4.6.0"
  pubspec_dependency_sorter: "^1.0.5"
  translations_cleaner: "^0.0.5"
dependency_overrides:

  audio_session:
    git:
      url: "https://gitcode.com/openharmony-sig/flutter_audio_session.git"
      ref: br_v0.1.21_ohos
  path_provider:
    git:
      url: "https://gitcode.com/openharmony-sig/flutter_packages.git"
      # ref: br_path_provider-v2.1.4_ohos
      path: "packages/path_provider/path_provider"
  win32: 5.10.1

repository: "https://github.com/gokadzev/Musify"
issue_tracker: "https://github.com/gokadzev/Musify/issues"
flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/licenses/
    - "assets/images/ic_launcher_foreground.png"
  fonts:
    - family: paytoneOne
      fonts:
        - asset: fonts/paytone/PaytoneOne-Regular.ttf
flutter_native_splash:
  color: "#f9fafd"
  image: "assets/images/ic_splash.png"
  color_dark: "#151515"
  image_dark: "assets/images/ic_splash.png"
  android_12:
    image: "assets/images/ic_splash.png"
    image_dark: "assets/images/ic_splash.png"
flutter_launcher_icons:
  android: true
  adaptive_icon_background: "#191919"
  adaptive_icon_foreground: "assets/images/ic_launcher_foreground.png"
  adaptive_icon_round: "assets/images/ic_launcher_round.png"
  adaptive_icon_monochrome: "assets/images/ic_launcher_foreground.png"
  image_path: "assets/images/ic_launcher.png"
  windows:
    generate: true
    image_path: "assets/images/ic_launcher_round.png"
    icon_size: 256
  macos:
    generate: true
    image_path: "assets/images/ic_launcher_round.png"
